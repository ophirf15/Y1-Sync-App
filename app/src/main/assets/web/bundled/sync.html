<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Sync</title><link rel="stylesheet" href="/css/app.css"></head>
<body><div class="layout"><div class="sidebar"><h1>Y1 Console</h1>
  <a href="/dashboard.html" data-nav="dashboard">Dashboard</a><a href="/profiles.html" data-nav="profiles">Sync Profiles</a><a href="/library.html" data-nav="library">Library</a><a href="/playlists.html" data-nav="playlists">Playlists</a><a href="/maintenance.html" data-nav="maintenance">Maintenance</a><a href="/updates.html" data-nav="updates">Updates</a><a href="/settings.html" data-nav="settings">Settings/Status</a>
</div><div class="content"><div class="topbar"><div class="ip" id="ipHeader">Loading...</div><div class="muted" id="statusHeader"></div></div>
  <div class="card"><h3>Sync Status</h3><div id="syncStatus"></div><div id="syncProgress" class="muted"></div><button onclick="y1Api.syncNow().then(load)">Run Sync Now</button></div>
  <div class="card"><h3>Recent Runs</h3><table><thead><tr><th>Profile</th><th>Trigger</th><th>Total</th><th>Success</th><th>Failed</th><th>Reason</th></tr></thead><tbody id="runs"></tbody></table></div>
</div></div>
<script src="/js/api.js"></script><script src="/js/app.js"></script>
<script>
  y1Ui.renderTopStatus();
  function renderStatus(s) {
    var line = "State: " + (s.state || "idle") + " | Last: " + (s.last_sync || "");
    if (s.state === "running") line += " | " + (s.current_index || 0) + "/" + (s.total_files || 0) + " " + (s.current_file || "");
    if (s.state === "error" && s.last_error) line += " | Error: " + s.last_error;
    document.getElementById("syncStatus").textContent = line;
    var pct = s.bytes_total > 0 ? Math.floor((100 * s.bytes_done) / s.bytes_total) : 0;
    var extra = "";
    if (s.failed_details) {
      extra = "\nFailed files:\n" + s.failed_details;
    }
    document.getElementById("syncProgress").textContent = "Progress: " + pct + "% (" + (s.bytes_done || 0) + "/" + (s.bytes_total || 0) + " bytes)" + extra;
  }
  function load(){
    y1Api.syncStatus().then(renderStatus);
    y1Api.syncRuns().then(function(r){
      document.getElementById("runs").innerHTML = y1Ui.toTableRows(r,["profile_id","trigger","total_files","success_files","failed_files","reason"]);
    });
  }
  load();
  setInterval(load, 1500);
</script>
</body></html>
