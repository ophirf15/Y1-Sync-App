<!doctype html>
<html><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Profiles</title><link rel="stylesheet" href="/css/app.css">
</head><body><div class="layout">
  <div class="sidebar"><h1>Y1 Console</h1>
    <a href="/dashboard.html" data-nav="dashboard">Dashboard</a>
    <a href="/profiles.html" data-nav="profiles">Sync Profiles</a>
    <a href="/library.html" data-nav="library">Library</a>
    <a href="/playlists.html" data-nav="playlists">Playlists</a>
    <a href="/maintenance.html" data-nav="maintenance">Maintenance</a>
    <a href="/updates.html" data-nav="updates">Updates</a>
    <a href="/settings.html" data-nav="settings">Settings/Status</a>
  </div>
  <div class="content">
    <div class="topbar"><div class="ip" id="ipHeader">Loading...</div><div class="muted" id="statusHeader"></div></div>
    <div class="card">
      <h3>Profiles</h3>
      <button onclick="createProfile()">Create Profile</button>
      <table><thead><tr><th>Name</th><th>Protocol</th><th>Host</th><th>Root</th><th>Local</th><th>Active</th><th>Actions</th></tr></thead><tbody id="rows"></tbody></table>
    </div>
  </div>
</div>
<script src="/js/api.js"></script><script src="/js/app.js"></script>
<script>
  y1Ui.setActiveNav("profiles"); y1Ui.renderTopStatus();
  function loadProfiles(){
    y1Api.profiles().then(function(list){
      var html = "";
      for (var i = 0; i < list.length; i++) {
        var p = list[i];
        html += "<tr>";
        html += "<td>" + (p.name || "") + "</td>";
        html += "<td>" + (p.protocol || "") + "</td>";
        html += "<td>" + (p.host || "") + ":" + (p.port || "") + "</td>";
        html += "<td>" + (p.remote_root_path || "") + "</td>";
        html += "<td>" + (p.local_destination || "") + "</td>";
        html += "<td>" + (p.is_active ? "Yes" : "No") + "</td>";
        html += "<td><a href='/profile-edit.html?id=" + p.id + "'><button>Edit</button></a>";
        html += "<button class='secondary' onclick='toggleActive(" + p.id + "," + (!p.is_active) + ")'>" + (p.is_active ? "Disable" : "Enable") + "</button>";
        html += "<button class='secondary' onclick='runSync(" + p.id + ")'>Sync</button></td>";
        html += "</tr>";
      }
      document.getElementById("rows").innerHTML = html || "<tr><td colspan='7' class='muted'>No profiles</td></tr>";
    });
  }
  function createProfile(){
    y1Api.createProfile({ name: "Profile " + Date.now(), protocol: "SMB", host: "", remote_root_path: "/", local_root_type: "SDCARD", local_destination: "Music" }).then(function(resp){
      if (resp && resp.id) {
        location.href = "/profile-edit.html?id=" + resp.id;
      } else {
        loadProfiles();
      }
    });
  }
  function toggleActive(id, active){ (active ? y1Api.enableProfile(id) : y1Api.disableProfile(id)).then(loadProfiles); }
  function runSync(id){
    y1Api.syncProfileNow(id).then(function(resp){
      if (resp && resp.accepted === false) {
        alert("Sync not started: " + (resp.error || "unknown reason"));
        return;
      }
      alert("Sync requested");
      y1Ui.renderTopStatus();
    });
  }
  loadProfiles();
</script>
</body></html>
