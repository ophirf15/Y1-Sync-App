<!doctype html>
<html><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Library</title><link rel="stylesheet" href="/css/app.css">
</head><body>
<style>
  .modalBackdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; z-index: 9999; }
  .modalCard { max-width: 560px; margin: 8vh auto; background: #1b1b1b; color: #eee; border: 1px solid #444; border-radius: 10px; padding: 14px; }
  .playlistOption { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding: 8px 0; }
</style>
<div class="layout">
  <div class="sidebar"><h1>Y1 Console</h1>
    <a href="/dashboard.html" data-nav="dashboard">Dashboard</a><a href="/profiles.html" data-nav="profiles">Sync Profiles</a>
    <a href="/library.html" data-nav="library">Library</a><a href="/playlists.html" data-nav="playlists">Playlists</a>
    <a href="/maintenance.html" data-nav="maintenance">Maintenance</a><a href="/updates.html" data-nav="updates">Updates</a><a href="/settings.html" data-nav="settings">Settings/Status</a>
  </div>
  <div class="content">
    <div class="topbar"><div class="ip" id="ipHeader">Loading...</div><div class="muted" id="statusHeader"></div></div>
    <div class="card">
      <h3>Library Manager</h3>
      <p class="muted" id="scanMeta"></p>
      <div class="row">
        <input id="q" placeholder="Search path, title, artist, album" onchange="load()">
        <label>Sort <select id="sort" onchange="load()">
          <option value="added_ts">Recently added</option>
          <option value="title">Title</option>
          <option value="artist">Artist</option>
          <option value="album">Album</option>
          <option value="path">Path</option>
        </select></label>
        <label>Order <select id="order" onchange="load()">
          <option value="desc">Desc</option>
          <option value="asc">Asc</option>
        </select></label>
      </div>
      <div class="row">
        <button onclick="rescan()">Rescan Library</button>
        <button class="secondary" onclick="reindexMeta()">Re-read tags (all)</button>
        <button class="secondary" onclick="loadDuplicates()">Find duplicates</button>
        <label><input id="selectAll" type="checkbox" onclick="toggleSelectAll(this.checked)"> Select all</label>
        <button class="secondary" onclick="bulkAddSelected()">Add selected to playlist</button>
        <button class="danger" onclick="bulkDeleteSelected()">Delete selected</button>
      </div>
      <table><thead><tr><th></th><th>Path</th><th>Artist</th><th>Album</th><th>Title</th><th>Profile</th><th></th></tr></thead><tbody id="rows"></tbody></table>
      <h4 style="margin-top:16px">Detected Duplicates</h4>
      <div id="dups" class="muted">Run “Find duplicates”.</div>
    </div>
  </div>
</div>
<div id="playlistModal" class="modalBackdrop" onclick="if(event.target===this)closePlaylistModal()">
  <div class="modalCard">
    <h3 style="margin-top:0">Add to playlist</h3>
    <p id="playlistModalInfo" class="muted"></p>
    <div id="playlistModalList"></div>
    <div class="row" style="margin-top:12px">
      <button class="secondary" onclick="closePlaylistModal()">Cancel</button>
    </div>
  </div>
</div>
<script src="/js/api.js"></script><script src="/js/app.js"></script>
<script>
  y1Ui.setActiveNav("library"); y1Ui.renderTopStatus();
  var lastItems = [];
  var pendingAddPaths = [];
  function scanLine() {
    fetch("/api/library/scan-status").then(function (r) { return r.json(); }).then(function (s) {
      var el = document.getElementById("scanMeta");
      if (el && s.last_scan_ts) el.textContent = "Last rescan: " + new Date(s.last_scan_ts).toLocaleString() + " — " + (s.last_scan_count || 0) + " files";
    });
  }
  function load() {
    var q = document.getElementById("q").value.trim();
    var sort = document.getElementById("sort").value;
    var order = document.getElementById("order").value;
    y1Api.libraryItems({ q: q, sort: sort, order: order }).then(function (items) {
      lastItems = items || [];
      var html = "";
      for (var i = 0; i < lastItems.length; i++) {
        var it = lastItems[i];
        html += "<tr>";
        html += "<td><input type='checkbox' class='rowSel' data-id='" + it.id + "' data-path=\"" + escapeHtml(it.path) + "\"></td>";
        html += "<td>" + escapeHtml(it.path) + "</td>";
        html += "<td>" + escapeHtml(it.artist) + "</td>";
        html += "<td>" + escapeHtml(it.album) + "</td>";
        html += "<td>" + escapeHtml(it.title) + "</td>";
        html += "<td>" + escapeHtml(it.profile) + "</td>";
        html += "<td>"
             + "<button class='secondary' onclick='addToPlaylistByIndex(" + i + ")'>Add</button> "
             + "<button class='secondary' onclick='addAlbumByIndex(" + i + ")'>Add album</button> "
             + "<button class='danger' onclick='del(" + it.id + ")'>Delete</button>"
             + "</td>";
        html += "</tr>";
      }
      document.getElementById("rows").innerHTML = html || "<tr><td colspan='7' class='muted'>No tracks</td></tr>";
    });
    scanLine();
  }
  function escapeHtml(s) {
    if (s === undefined || s === null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;");
  }
  function del(id) {
    if (!confirm("Delete this track from the library and disk?")) return;
    y1Api.libraryDeleteItem(id).then(function (r) {
      if (r.ok === false) alert(r.error || "Delete failed");
      load();
    });
  }
  function rescan() {
    y1Api.libraryRescan().then(function (r) {
      alert("Rescan: indexed " + (r.indexed != null ? r.indexed : "?"));
      load();
    });
  }
  function reindexMeta() {
    y1Api.libraryReindexMetadata().then(function (r) {
      alert("Reindexed metadata: " + (r.reindexed != null ? r.reindexed : "?"));
      load();
    });
  }
  function openPlaylistModal(pathsToAdd) {
    pendingAddPaths = pathsToAdd || [];
    if (!pendingAddPaths.length) return;
    y1Api.playlists().then(function (pls) {
      var playlistCache = pls || [];
      if (!playlistCache.length) {
        alert("No playlists yet. Create one in Playlists.");
        return;
      }
      document.getElementById("playlistModalInfo").textContent = "Adding " + pendingAddPaths.length + " track(s). Choose destination playlist:";
      var html = "";
      for (var i = 0; i < playlistCache.length; i++) {
        var pl = playlistCache[i];
        html += "<div class='playlistOption'><div>" + escapeHtml(pl.name) + " <span class='muted'>(" + (pl.entries || 0) + " entries)</span></div>"
             + "<button onclick='confirmAddToPlaylist(" + pl.id + ",\"" + escapeHtml(pl.name).replace(/"/g, "&quot;") + "\")'>Add here</button></div>";
      }
      document.getElementById("playlistModalList").innerHTML = html;
      document.getElementById("playlistModal").style.display = "block";
    });
  }
  function closePlaylistModal() {
    document.getElementById("playlistModal").style.display = "none";
    pendingAddPaths = [];
  }
  function confirmAddToPlaylist(id, name) {
    y1Api.addPlaylistTracksBulk(id, pendingAddPaths).then(function (r) {
      closePlaylistModal();
      alert(r && r.ok === false ? ("Failed: " + (r.error || "")) : ("Added " + pendingAddPaths.length + " track(s) to " + name));
    });
  }
  function addToPlaylistByIndex(itemIndex) {
    var it = lastItems[itemIndex];
    if (!it) return;
    openPlaylistModal([it.path]);
  }
  function addAlbumByIndex(itemIndex) {
    var it = lastItems[itemIndex];
    if (!it || !it.album) {
      alert("This track has no album metadata.");
      return;
    }
    var sameAlbumPaths = [];
    for (var i = 0; i < lastItems.length; i++) {
      if (String(lastItems[i].album || "") === String(it.album || "")) {
        sameAlbumPaths.push(lastItems[i].path);
      }
    }
    if (!sameAlbumPaths.length) return;
    openPlaylistModal(sameAlbumPaths);
  }
  function getSelectedRows() {
    var selected = [];
    document.querySelectorAll(".rowSel:checked").forEach(function (el) {
      selected.push({
        id: parseInt(el.getAttribute("data-id"), 10),
        path: el.getAttribute("data-path")
      });
    });
    return selected;
  }
  function toggleSelectAll(checked) {
    document.querySelectorAll(".rowSel").forEach(function (el) { el.checked = !!checked; });
  }
  function bulkAddSelected() {
    var rows = getSelectedRows();
    if (!rows.length) {
      alert("Select at least one track.");
      return;
    }
    var paths = rows.map(function (r) { return r.path; });
    openPlaylistModal(paths);
  }
  function bulkDeleteSelected() {
    var rows = getSelectedRows();
    if (!rows.length) {
      alert("Select at least one track.");
      return;
    }
    if (!confirm("Delete " + rows.length + " selected track(s) from disk and library?")) return;
    var p = Promise.resolve();
    var failed = 0;
    rows.forEach(function (r) {
      p = p.then(function () {
        return y1Api.libraryDeleteItem(r.id).then(function (res) {
          if (res && res.ok === false) failed++;
        });
      });
    });
    p.then(function () {
      alert(failed ? ("Deleted with " + failed + " failures.") : "Deleted selected tracks.");
      load();
    });
  }
  function loadDuplicates() {
    var box = document.getElementById("dups");
    box.textContent = "Scanning duplicates...";
    y1Api.libraryDuplicates().then(function(groups) {
      groups = groups || [];
      if (!groups.length) {
        box.innerHTML = "<span class='muted'>No duplicates found.</span>";
        return;
      }
      var html = "";
      for (var i = 0; i < groups.length; i++) {
        var g = groups[i];
        html += "<div style='border:1px solid #333;padding:8px;margin:8px 0;border-radius:8px'>";
        html += "<div><b>" + escapeHtml(g.key_title || "(untitled)") + "</b> — " + escapeHtml(g.key_artist || "(unknown artist)") + " <span class='muted'>(" + (g.count || 0) + " copies)</span></div>";
        html += "<div class='muted'>Duration: " + Math.floor((g.duration_ms || 0) / 1000) + "s</div>";
        var items = g.items || [];
        for (var j = 0; j < items.length; j++) {
          var it = items[j];
          var keep = j === 0 ? " <span class='muted'>(newest, keep)</span>" : "";
          html += "<div style='display:flex;justify-content:space-between;gap:8px;padding:4px 0'>";
          html += "<div style='word-break:break-all'>" + escapeHtml(it.path || "") + keep + "</div>";
          if (j > 0) {
            html += "<button class='danger' onclick='deleteDup(" + parseInt(it.id, 10) + ")'>Delete</button>";
          } else {
            html += "<span class='muted'>—</span>";
          }
          html += "</div>";
        }
        html += "</div>";
      }
      box.innerHTML = html;
    });
  }
  function deleteDup(id) {
    if (!confirm("Delete this duplicate from disk and library?")) return;
    y1Api.libraryDeleteItem(id).then(function (r) {
      if (r && r.ok === false) {
        alert("Delete failed: " + (r.error || ""));
        return;
      }
      load();
      loadDuplicates();
    });
  }
  load();
</script>
</body></html>
