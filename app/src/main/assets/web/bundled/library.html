<!doctype html>
<html><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Library</title><link rel="stylesheet" href="/css/app.css">
</head><body><div class="layout">
  <div class="sidebar"><h1>Y1 Console</h1>
    <a href="/dashboard.html" data-nav="dashboard">Dashboard</a><a href="/profiles.html" data-nav="profiles">Sync Profiles</a>
    <a href="/library.html" data-nav="library">Library</a><a href="/playlists.html" data-nav="playlists">Playlists</a>
    <a href="/maintenance.html" data-nav="maintenance">Maintenance</a><a href="/updates.html" data-nav="updates">Updates</a><a href="/settings.html" data-nav="settings">Settings/Status</a>
  </div>
  <div class="content">
    <div class="topbar"><div class="ip" id="ipHeader">Loading...</div><div class="muted" id="statusHeader"></div></div>
    <div class="card">
      <h3>Library Manager</h3>
      <div class="row"><input id="q" placeholder="Search artist, album, title, path"><select><option>Tracks</option><option>Artists</option><option>Albums</option><option>Folders</option><option>Recently Added</option><option>Duplicate Candidates</option><option>Orphaned Files</option><option>Missing Artwork</option></select></div>
      <button onclick="rescan()">Rescan Library</button>
      <table><thead><tr><th>Path</th><th>Artist</th><th>Album</th><th>Title</th><th>Profile</th></tr></thead><tbody id="rows"></tbody></table>
    </div>
  </div>
</div>
<script src="/js/api.js"></script><script src="/js/app.js"></script>
<script>
  y1Ui.setActiveNav("library"); y1Ui.renderTopStatus();
  function load(){ y1Api.libraryItems().then(function(items){ document.getElementById("rows").innerHTML = y1Ui.toTableRows(items,["path","artist","album","title","profile"]); }); }
  function rescan(){ y1Api.libraryRescan().then(function(){ alert("Library rescan triggered"); }); }
  load();
</script>
</body></html>
