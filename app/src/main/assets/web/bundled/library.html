<!doctype html>
<html><head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Library</title><link rel="stylesheet" href="/css/app.css">
</head><body><div class="layout">
  <div class="sidebar"><h1>Y1 Console</h1>
    <a href="/dashboard.html" data-nav="dashboard">Dashboard</a><a href="/profiles.html" data-nav="profiles">Sync Profiles</a>
    <a href="/library.html" data-nav="library">Library</a><a href="/playlists.html" data-nav="playlists">Playlists</a>
    <a href="/maintenance.html" data-nav="maintenance">Maintenance</a><a href="/updates.html" data-nav="updates">Updates</a><a href="/settings.html" data-nav="settings">Settings/Status</a>
  </div>
  <div class="content">
    <div class="topbar"><div class="ip" id="ipHeader">Loading...</div><div class="muted" id="statusHeader"></div></div>
    <div class="card">
      <h3>Library Manager</h3>
      <p class="muted" id="scanMeta"></p>
      <div class="row">
        <input id="q" placeholder="Search path, title, artist, album" onchange="load()">
        <label>Sort <select id="sort" onchange="load()">
          <option value="added_ts">Recently added</option>
          <option value="title">Title</option>
          <option value="artist">Artist</option>
          <option value="album">Album</option>
          <option value="path">Path</option>
        </select></label>
        <label>Order <select id="order" onchange="load()">
          <option value="desc">Desc</option>
          <option value="asc">Asc</option>
        </select></label>
      </div>
      <div class="row">
        <button onclick="rescan()">Rescan Library</button>
        <button class="secondary" onclick="reindexMeta()">Re-read tags (all)</button>
      </div>
      <table><thead><tr><th>Path</th><th>Artist</th><th>Album</th><th>Title</th><th>Profile</th><th></th></tr></thead><tbody id="rows"></tbody></table>
    </div>
  </div>
</div>
<script src="/js/api.js"></script><script src="/js/app.js"></script>
<script>
  y1Ui.setActiveNav("library"); y1Ui.renderTopStatus();
  var lastItems = [];
  var playlistCache = [];
  function scanLine() {
    fetch("/api/library/scan-status").then(function (r) { return r.json(); }).then(function (s) {
      var el = document.getElementById("scanMeta");
      if (el && s.last_scan_ts) el.textContent = "Last rescan: " + new Date(s.last_scan_ts).toLocaleString() + " — " + (s.last_scan_count || 0) + " files";
    });
  }
  function load() {
    var q = document.getElementById("q").value.trim();
    var sort = document.getElementById("sort").value;
    var order = document.getElementById("order").value;
    y1Api.libraryItems({ q: q, sort: sort, order: order }).then(function (items) {
      lastItems = items || [];
      var html = "";
      for (var i = 0; i < lastItems.length; i++) {
        var it = lastItems[i];
        html += "<tr>";
        html += "<td>" + escapeHtml(it.path) + "</td>";
        html += "<td>" + escapeHtml(it.artist) + "</td>";
        html += "<td>" + escapeHtml(it.album) + "</td>";
        html += "<td>" + escapeHtml(it.title) + "</td>";
        html += "<td>" + escapeHtml(it.profile) + "</td>";
        html += "<td>"
             + "<button class='secondary' onclick='addToPlaylistByIndex(" + i + ")'>Add</button> "
             + "<button class='secondary' onclick='addAlbumByIndex(" + i + ")'>Add album</button> "
             + "<button class='danger' onclick='del(" + it.id + ")'>Delete</button>"
             + "</td>";
        html += "</tr>";
      }
      document.getElementById("rows").innerHTML = html || "<tr><td colspan='6' class='muted'>No tracks</td></tr>";
    });
    scanLine();
  }
  function escapeHtml(s) {
    if (s === undefined || s === null) return "";
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;");
  }
  function del(id) {
    if (!confirm("Delete this track from the library and disk?")) return;
    y1Api.libraryDeleteItem(id).then(function (r) {
      if (r.ok === false) alert(r.error || "Delete failed");
      load();
    });
  }
  function rescan() {
    y1Api.libraryRescan().then(function (r) {
      alert("Rescan: indexed " + (r.indexed != null ? r.indexed : "?"));
      load();
    });
  }
  function reindexMeta() {
    y1Api.libraryReindexMetadata().then(function (r) {
      alert("Reindexed metadata: " + (r.reindexed != null ? r.reindexed : "?"));
      load();
    });
  }
  function choosePlaylist(cb) {
    y1Api.playlists().then(function (pls) {
      playlistCache = pls || [];
      if (!playlistCache.length) {
        alert("No playlists yet. Create one in Playlists.");
        return;
      }
      var text = "Choose playlist number:\n";
      for (var i = 0; i < playlistCache.length; i++) {
        text += (i + 1) + ". " + playlistCache[i].name + "\n";
      }
      var pick = prompt(text);
      if (!pick) return;
      var idx = parseInt(pick, 10) - 1;
      if (idx < 0 || idx >= playlistCache.length) return;
      cb(playlistCache[idx]);
    });
  }
  function addToPlaylistByIndex(itemIndex) {
    var it = lastItems[itemIndex];
    if (!it) return;
    choosePlaylist(function (pl) {
      y1Api.addPlaylistTrack(pl.id, it.path).then(function (r) {
        alert(r.ok === false ? ("Failed: " + (r.error || "")) : "Added to " + pl.name);
      });
    });
  }
  function addAlbumByIndex(itemIndex) {
    var it = lastItems[itemIndex];
    if (!it || !it.album) {
      alert("This track has no album metadata.");
      return;
    }
    var sameAlbumPaths = [];
    for (var i = 0; i < lastItems.length; i++) {
      if (String(lastItems[i].album || "") === String(it.album || "")) {
        sameAlbumPaths.push(lastItems[i].path);
      }
    }
    if (!sameAlbumPaths.length) return;
    choosePlaylist(function (pl) {
      var p = Promise.resolve();
      var added = 0;
      sameAlbumPaths.forEach(function (path) {
        p = p.then(function () {
          return y1Api.addPlaylistTrack(pl.id, path).then(function (r) {
            if (r && r.ok !== false) added++;
          });
        });
      });
      p.then(function () { alert("Added " + added + " tracks to " + pl.name); });
    });
  }
  load();
</script>
</body></html>
