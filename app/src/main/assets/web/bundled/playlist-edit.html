<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Playlist Editor</title><link rel="stylesheet" href="/css/app.css"></head>
<body><div class="layout"><div class="sidebar"><h1>Y1 Console</h1>
  <a href="/dashboard.html">Dashboard</a><a href="/profiles.html">Sync Profiles</a><a href="/library.html">Library</a><a class="active" href="/playlists.html">Playlists</a><a href="/maintenance.html">Maintenance</a><a href="/updates.html">Updates</a><a href="/settings.html">Settings/Status</a>
</div><div class="content"><div class="topbar"><div class="ip" id="ipHeader">Loading...</div><div class="muted" id="statusHeader"></div></div>
  <div class="card"><h3>Playlist Editor</h3>
    <p class="muted" id="pidLine"></p>
    <div class="row">
      <input id="plName" placeholder="Name">
      <button onclick="rename()">Save name</button>
      <button class="secondary" onclick="dup()">Duplicate</button>
      <button class="danger" onclick="delPl()">Delete playlist</button>
    </div>
    <div class="row">
      <button onclick="addTrack()">Add track (absolute path)</button>
      <button class="secondary" onclick="exportM3u()">Export M3U8</button>
      <a href="/playlists.html"><button class="secondary">Back</button></a>
    </div>
    <table><thead><tr><th>#</th><th>Artist</th><th>Album</th><th>Title</th><th>Path</th><th></th></tr></thead><tbody id="rows"></tbody></table>
  </div>
</div></div>
<script src="/js/api.js"></script><script src="/js/app.js"></script>
<script>
  y1Ui.renderTopStatus();
  var playlistId = (function () {
    var m = /[?&]id=(\d+)/.exec(window.location.search);
    return m ? parseInt(m[1], 10) : 0;
  })();
  document.getElementById("pidLine").textContent = playlistId ? ("Playlist id: " + playlistId) : "Missing ?id= in URL";
  function loadMeta() {
    if (!playlistId) return;
    y1Api.playlist(playlistId).then(function (p) {
      if (p.error) { alert(p.error); return; }
      document.getElementById("plName").value = p.name || "";
    });
  }
  function loadEntries() {
    if (!playlistId) return;
    y1Api.playlistEntries(playlistId).then(function (items) {
      var html = "";
      for (var i = 0; i < items.length; i++) {
        var e = items[i];
        html += "<tr><td>" + (i + 1) + "</td><td>" + esc(e.artist) + "</td><td>" + esc(e.album) + "</td><td>" + esc(e.title) + "</td><td>" + esc(e.path) + "</td>";
        html += "<td><button class='danger' onclick='removeEntry(" + e.entry_id + ")'>Remove</button></td></tr>";
      }
      document.getElementById("rows").innerHTML = html || "<tr><td colspan='6' class='muted'>No tracks</td></tr>";
    });
  }
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
  function rename() {
    var n = document.getElementById("plName").value.trim();
    if (!n || !playlistId) return;
    y1Api.updatePlaylist(playlistId, { name: n }).then(function (r) {
      if (!r.ok) alert("Rename failed");
      loadMeta();
    });
  }
  function dup() {
    if (!playlistId) return;
    y1Api.duplicatePlaylist(playlistId).then(function (r) {
      if (r.id) window.location.href = "/playlist-edit.html?id=" + r.id;
      else alert("Duplicate failed");
    });
  }
  function delPl() {
    if (!playlistId || !confirm("Delete entire playlist?")) return;
    y1Api.deletePlaylist(playlistId).then(function () {
      window.location.href = "/playlists.html";
    });
  }
  function addTrack() {
    var p = prompt("Absolute file path on device (e.g. /storage/emulated/0/Music/song.mp3)");
    if (!p || !playlistId) return;
    y1Api.addPlaylistTrack(playlistId, p).then(function (r) {
      loadEntries();
    });
  }
  function removeEntry(entryId) {
    if (!confirm("Remove this entry?")) return;
    y1Api.removePlaylistEntry(playlistId, entryId).then(function () { loadEntries(); });
  }
  function exportM3u() {
    if (!playlistId) return;
    window.open(y1Api.playlistExportUrl(playlistId), "_blank");
  }
  loadMeta();
  loadEntries();
</script>
</body></html>
