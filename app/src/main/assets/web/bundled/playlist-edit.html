<!doctype html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Playlist Editor</title><link rel="stylesheet" href="/css/app.css">
  <style>
    .modalBackdrop { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; z-index: 9999; }
    .modalCard { max-width: 560px; margin: 10vh auto; background: #1b1b1b; color: #eee; border: 1px solid #444; border-radius: 10px; padding: 14px; }
  </style>
</head>
<body><div class="layout"><div class="sidebar"><h1>Y1 Console</h1>
  <a href="/dashboard.html">Dashboard</a><a href="/profiles.html">Sync Profiles</a><a href="/library.html">Library</a><a class="active" href="/playlists.html">Playlists</a><a href="/maintenance.html">Maintenance</a><a href="/updates.html">Updates</a><a href="/settings.html">Settings/Status</a>
</div><div class="content"><div class="topbar"><div class="ip" id="ipHeader">Loading...</div><div class="muted" id="statusHeader"></div></div>
  <div class="card"><h3>Playlist Editor</h3>
    <p class="muted" id="pidLine"></p>
    <div class="row">
      <input id="plName" placeholder="Name">
      <button onclick="rename()">Save name</button>
      <button class="secondary" onclick="dup()">Duplicate</button>
      <button class="danger" onclick="delPl()">Delete playlist</button>
    </div>
    <div class="row">
      <button onclick="openAddTrackModal()">Add track (absolute path)</button>
      <button onclick="saveOrder()" class="secondary">Save drag order</button>
      <button class="secondary" onclick="exportM3u()">Export M3U8</button>
      <a href="/playlists.html"><button class="secondary">Back</button></a>
    </div>
    <div id="msg" class="muted"></div>
    <table><thead><tr><th>#</th><th>Artist</th><th>Album</th><th>Title</th><th>Path</th><th></th></tr></thead><tbody id="rows"></tbody></table>
  </div>
</div></div>

<div id="addTrackModal" class="modalBackdrop" onclick="if(event.target===this)closeAddTrackModal()">
  <div class="modalCard">
    <h3 style="margin-top:0">Add track to playlist</h3>
    <input id="trackPathInput" placeholder="/storage/emulated/0/Music/song.mp3">
    <div class="row"><button onclick="addTrack()">Add</button><button class="secondary" onclick="closeAddTrackModal()">Cancel</button></div>
  </div>
</div>

<div id="confirmModal" class="modalBackdrop" onclick="if(event.target===this)closeConfirmModal()">
  <div class="modalCard">
    <h3 style="margin-top:0">Confirm</h3>
    <p id="confirmText"></p>
    <div class="row"><button class="danger" id="confirmOkBtn">Delete</button><button class="secondary" onclick="closeConfirmModal()">Cancel</button></div>
  </div>
</div>

<script src="/js/api.js"></script><script src="/js/app.js"></script>
<script>
  y1Ui.renderTopStatus();
  var entryOrder = [];
  var pendingConfirmAction = null;
  var playlistId = (function () {
    var m = /[?&]id=(\d+)/.exec(window.location.search);
    return m ? parseInt(m[1], 10) : 0;
  })();
  document.getElementById("pidLine").textContent = playlistId ? ("Playlist id: " + playlistId) : "Missing ?id= in URL";
  function loadMeta() {
    if (!playlistId) return;
    y1Api.playlist(playlistId).then(function (p) {
      if (p.error) { message(p.error); return; }
      document.getElementById("plName").value = p.name || "";
    });
  }
  function loadEntries() {
    if (!playlistId) return;
    y1Api.playlistEntries(playlistId).then(function (items) {
      entryOrder = [];
      var html = "";
      for (var i = 0; i < items.length; i++) {
        var e = items[i];
        entryOrder.push(e.entry_id);
        html += "<tr draggable='true' data-entry-id='" + e.entry_id + "'><td>:: " + (i + 1) + "</td><td>" + esc(e.artist) + "</td><td>" + esc(e.album) + "</td><td>" + esc(e.title) + "</td><td>" + esc(e.path) + "</td>";
        html += "<td><button class='danger' onclick='removeEntry(" + e.entry_id + ")'>Remove</button></td></tr>";
      }
      document.getElementById("rows").innerHTML = html || "<tr><td colspan='6' class='muted'>No tracks</td></tr>";
      wireDnd();
    });
  }
  function esc(s) { return String(s == null ? "" : s).replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
  function message(t) { document.getElementById("msg").textContent = t || ""; }
  function rename() {
    var n = document.getElementById("plName").value.trim();
    if (!n || !playlistId) return;
    y1Api.updatePlaylist(playlistId, { name: n }).then(function (r) {
      if (!r.ok) message("Rename failed");
      else message("Playlist renamed.");
      loadMeta();
    });
  }
  function dup() {
    if (!playlistId) return;
    y1Api.duplicatePlaylist(playlistId).then(function (r) {
      if (r.id) window.location.href = "/playlist-edit.html?id=" + r.id;
      else message("Duplicate failed");
    });
  }
  function delPl() {
    if (!playlistId) return;
    y1Api.deletePlaylist(playlistId).then(function () {
      window.location.href = "/playlists.html";
    });
  }
  function openAddTrackModal() {
    document.getElementById("trackPathInput").value = "";
    document.getElementById("addTrackModal").style.display = "block";
  }
  function closeAddTrackModal() { document.getElementById("addTrackModal").style.display = "none"; }
  function addTrack() {
    var p = document.getElementById("trackPathInput").value.trim();
    if (!p || !playlistId) return;
    y1Api.addPlaylistTrack(playlistId, p).then(function (r) {
      closeAddTrackModal();
      message((r && r.ok === false) ? "Add failed." : "Track added.");
      loadEntries();
    });
  }
  function removeEntry(entryId) {
    pendingConfirmAction = function () {
      y1Api.removePlaylistEntry(playlistId, entryId).then(function () { message("Entry removed."); loadEntries(); });
    };
    document.getElementById("confirmText").textContent = "Remove this entry from playlist?";
    document.getElementById("confirmModal").style.display = "block";
  }
  function closeConfirmModal() { document.getElementById("confirmModal").style.display = "none"; pendingConfirmAction = null; }
  document.getElementById("confirmOkBtn").onclick = function () { if (pendingConfirmAction) pendingConfirmAction(); closeConfirmModal(); };
  function exportM3u() {
    if (!playlistId) return;
    window.open(y1Api.playlistExportUrl(playlistId), "_blank");
  }
  function wireDnd() {
    var tbody = document.getElementById("rows");
    if (!tbody) return;
    var dragged = null;
    tbody.querySelectorAll("tr[draggable='true']").forEach(function (row) {
      row.addEventListener("dragstart", function () { dragged = row; });
      row.addEventListener("dragover", function (ev) { ev.preventDefault(); });
      row.addEventListener("drop", function (ev) {
        ev.preventDefault();
        if (!dragged || dragged === row) return;
        var rows = Array.prototype.slice.call(tbody.querySelectorAll("tr[draggable='true']"));
        if (rows.indexOf(dragged) < rows.indexOf(row)) {
          tbody.insertBefore(dragged, row.nextSibling);
        } else {
          tbody.insertBefore(dragged, row);
        }
      });
    });
  }
  function saveOrder() {
    var tbody = document.getElementById("rows");
    var order = [];
    tbody.querySelectorAll("tr[draggable='true']").forEach(function (r) {
      order.push(parseInt(r.getAttribute("data-entry-id"), 10));
    });
    y1Api.reorderPlaylist(playlistId, order).then(function (r) {
      if (r.ok === false) message("Failed to save order");
      else message("Order saved.");
      loadEntries();
    });
  }
  loadMeta();
  loadEntries();
</script>
</body></html>
