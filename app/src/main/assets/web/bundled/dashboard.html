<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Y1 Console - Dashboard</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h1>Y1 Console</h1>
    <a href="/dashboard.html" data-nav="dashboard">Dashboard</a>
    <a href="/profiles.html" data-nav="profiles">Sync Profiles</a>
    <a href="/library.html" data-nav="library">Library</a>
    <a href="/playlists.html" data-nav="playlists">Playlists</a>
    <a href="/maintenance.html" data-nav="maintenance">Maintenance</a>
    <a href="/updates.html" data-nav="updates">Updates</a>
    <a href="/settings.html" data-nav="settings">Settings/Status</a>
  </div>
  <div class="content">
    <div class="topbar">
      <div class="ip" id="ipHeader">Loading...</div>
      <div class="muted" id="statusHeader"></div>
    </div>
    <div class="grid">
      <div class="card"><h3>Device</h3><div id="deviceInfo"></div></div>
      <div class="card"><h3>Storage</h3><div id="storageInfo"></div></div>
      <div class="card"><h3>Battery</h3><div id="batteryInfo"></div></div>
      <div class="card"><h3>Quick Actions</h3>
        <button onclick="runAction('/api/sync/now')">Sync Now</button>
        <button onclick="runAction('/api/library/rescan')">Rescan Library</button>
        <button onclick="runAction('/api/maintenance/rebuild-sync-index')">Rebuild Index</button>
        <button onclick="runAction('/api/updates/check')">Check Updates</button>
        <div id="syncProgress" class="muted" style="margin-top:8px"></div>
      </div>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
  y1Ui.setActiveNav("dashboard");
  y1Ui.renderTopStatus();
  y1Api.status().then(function (s) {
    document.getElementById("storageInfo").textContent = s.storage;
    document.getElementById("batteryInfo").textContent = s.battery;
  });
  y1Api.deviceInfo().then(function (d) {
    document.getElementById("deviceInfo").textContent = d.model + " | Android " + d.android + " | SDK " + d.sdk;
  });
  function refreshSyncProgress() {
    y1Api.syncStatus().then(function (s) {
      var el = document.getElementById("syncProgress");
      if (!el) return;
      if (s.state === "running") {
        var pct = s.bytes_total > 0 ? Math.floor((100 * s.bytes_done) / s.bytes_total) : 0;
        el.textContent = "Syncing " + (s.current_index || 0) + "/" + (s.total_files || 0) + " (" + pct + "%): " + (s.current_file || "");
      } else if (s.state === "error") {
        var details = s.failed_details ? (" | " + s.failed_details.split("\n")[0]) : "";
        el.textContent = "Sync error: " + (s.last_error || s.summary || "") + details;
      } else if (s.state === "done") {
        el.textContent = "Last: " + (s.summary || "");
      } else {
        el.textContent = "";
      }
    });
  }
  setInterval(refreshSyncProgress, 1500);
  refreshSyncProgress();
  function runAction(path) {
    fetch(path, { method: "POST" })
      .then(function (r) {
        return r.text().then(function (t) {
          var j = {};
          try { j = JSON.parse(t); } catch (e) {}
          if (!r.ok) {
            alert("Failed (" + r.status + "): " + (j.error || j.message || t || "unknown"));
            return;
          }
          if (j.ok === false) {
            alert("Failed: " + (j.error || j.message || JSON.stringify(j)));
            return;
          }
          alert("OK: " + (t.length > 400 ? t.substring(0, 400) + "…" : t));
          y1Ui.renderTopStatus();
        });
      })
      .catch(function (e) {
        alert(String(e));
      });
  }
</script>
</body>
</html>
